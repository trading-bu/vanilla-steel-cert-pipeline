# GitHub Actions workflow for the Vanilla Steel certificate neutralisation pipeline.
# Place this file at: .github/workflows/neutralise.yml in your repo.
#
# Required GitHub Secrets (Settings → Secrets → Actions → New repository secret):
#   DOCSUMO_API_KEY              — Your Docsumo API key
#   ODOO_API_KEY                 — Odoo XML-RPC API key
#   GOOGLE_SERVICE_ACCOUNT_JSON  — Full JSON content of the service account key file
#   CUSTOMER_CERTS_FOLDER_ID     — Google Drive folder ID for the output certs

name: Neutralise Certificates

on:
  schedule:
    # Runs at 08:05 Berlin time (07:05 UTC in winter / 06:05 UTC in summer)
    # 5 minutes after the Apps Script cert-fetching trigger runs at 08:00
    - cron: "5 7 * * *"

  # Allows you to trigger this manually from the GitHub Actions tab at any time
  workflow_dispatch:

# Allow the workflow to commit and push the updated processed_ids.json
permissions:
  contents: write

jobs:
  neutralise:
    name: Generate Neutralised Certificates
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run neutralisation pipeline
        working-directory: pipeline
        env:
          DOCSUMO_API_KEY:             ${{ secrets.DOCSUMO_API_KEY }}
          ODOO_API_KEY:                ${{ secrets.ODOO_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          CUSTOMER_CERTS_FOLDER_ID:    ${{ secrets.CUSTOMER_CERTS_FOLDER_ID }}
        run: python main.py

      - name: Save processed IDs back to repo
        # Runs even if the previous step had some errors (partial success)
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pipeline/processed_ids.json
          git diff --cached --quiet || git commit -m "chore: update processed cert IDs [skip ci]"
          git push
